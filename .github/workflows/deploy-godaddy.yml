name: Deploy to GoDaddy

'on':
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.GODADDY_FTP_HOST || secrets.FTP_SERVER || secrets.FTP_HOST }}
      FTP_USERNAME: ${{ secrets.GODADDY_FTP_USERNAME || secrets.FTP_USERNAME || secrets.FTP_USER }}
      FTP_PASSWORD: ${{ secrets.GODADDY_FTP_PASSWORD || secrets.FTP_PASSWORD }}
      FTP_PORT: ${{ secrets.GODADDY_FTP_PORT || secrets.FTP_PORT || '21' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Validate FTP secrets
        run: |
          if [ -z "$FTP_SERVER" ]; then
            echo "::error::Missing FTP host secret. Set GODADDY_FTP_HOST (or FTP_SERVER/FTP_HOST)."
            exit 1
          fi
          if [ -z "$FTP_USERNAME" ]; then
            echo "::error::Missing FTP username secret. Set GODADDY_FTP_USERNAME (or FTP_USERNAME/FTP_USER)."
            exit 1
          fi
          if [ -z "$FTP_PASSWORD" ]; then
            echo "::error::Missing FTP password secret. Set GODADDY_FTP_PASSWORD (or FTP_PASSWORD)."
            exit 1
          fi

      - name: Install and build frontend
        working-directory: News Media Website Design
        run: |
          npm install
          npm run build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy
          cp -R "News Media Website Design/dist/." deploy/
          cp -R api deploy/api
          if [ -d pages ]; then cp -R pages deploy/pages; fi
          if [ -f robots.txt ]; then cp robots.txt deploy/; fi
          if [ -f sitemap.xml ]; then cp sitemap.xml deploy/; fi

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          port: ${{ env.FTP_PORT }}
          protocol: ftp
          local-dir: deploy/
          server-dir: /public_html/
          dangerous-clean-slate: false
